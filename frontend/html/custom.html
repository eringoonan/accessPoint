<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Custom Search</title>
  <link rel="stylesheet" href="/css/custom.css" />
</head>
<body>
  <header id="navbar">
    <nav class="navbar">
      <div class="navbar-left">
        <img src="/assets/aplogotrans.png" alt="Logo" class="navbar-logo" />
        <a href="/index.html">AccessPoint</a>
      </div>
      <div class="navbar-right">
        <a id="admin-link" href="/html/admin.html" style="display:none;">Admin</a>
        <a href="/index.html">Home</a>
        <a href="/html/controllers.html">Controllers</a>
        <a href="/html/games.html">Games</a>
        <a href="/html/custom.html">Custom Search</a>
        <a href="/html/signup.html" id="auth-link">Sign Up</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="search-type-selection">
      <h1>Custom Search</h1>
      <h2>Browse accessible controllers and games through user-specific recommendation search</h2>

      <div class="search-options">
        <button id="controller-search-btn">Search Controllers</button>
        <button id="game-search-btn">Search Games</button>
      </div>
    </section>

    <section id="custom-filter-container" style="display:none;">
    </section>

    <section id="results-section" style="display:none;">
      <div class="results-header">
        <h2>Results</h2>
        <p id="results-count" class="results-count"></p>
      </div>

      <p id="no-results-msg" class="no-results-msg" style="display:none;">
        No controllers matched all of your selected requirements. Try removing some filters.
      </p>

      <div id="results-grid" class="controllers-grid"></div>
    </section>
  </main>

  <script type="module" src="/javascript/pages/customPage.js"></script>
  <script type="module" src="/javascript/components/navbar.js" defer></script>
  <script type="module" src="/javascript/components/accessibility.js"></script>
</body>
</html>
